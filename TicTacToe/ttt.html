<!doctype html>
<html>
  <head>
    <title>Tic Tac Toe</title>
    <!--P5 Play-->
  </head>

  <body>
    <link rel="stylesheet" href="ttt_style.css" />

    <div id="endScreenDiv" style="visibility: hidden">
      <h1 id="endGameHeader" style="text-align: center">Player... wins!</h1>
      <div style="display: flex; justify-content: center">
        <button id="leaveButton" style="font-size: 20px; padding: 2vh">
          Leave
        </button>
        <button id="rematchButton" style="font-size: 20px; padding: 2vh">
          Rematch
        </button>
      </div>
    </div>
  </body>
  <script src="https://q5js.org/q5.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.8.0/addons/p5.sound.js"
    integrity="sha512-TU9AWtV5uUZPX8dbBAH8NQF1tSdigPRRT82vllAQ1Ke28puiqLA6ZVKxtUGlgrH6yWFnkKy+sE6luNEGH9ar0A=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"></script>
  <script src="https://p5play.org/v3/planck.min.js"></script>
  <script src="https://p5play.org/v3/p5play.js"></script>
  <script id="lobby_script" type="module" src="ttt_lobby.mjs"></script>
</html>
